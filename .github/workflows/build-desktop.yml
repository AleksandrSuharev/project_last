name: Build desktop executables

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-latest
            artifact_name: linux
          - os: macos-latest
            artifact_name: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build executable
        run: uv run pyinstaller --noconfirm --clean --windowed --name CO2ControlApp --paths src src/co2_control_app/__main__.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CO2ControlApp-${{ matrix.artifact_name }}
          path: dist/**
          if-no-files-found: error
